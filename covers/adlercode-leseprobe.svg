<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1305" role="img" aria-labelledby="title desc">
  <title id="title">Adlercode Einführung und Leseprobe</title>
  <desc id="desc">Schwarzes Adlercode PDF-Cover mit goldenen Akzenten.</desc>
  <defs>
