<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nachrichten | Adlercode</title>
    <meta name="description" content="Private Adlercode-Nachrichten zu Analysen, Filmen, Charakteren und Mustern." />
    <link rel="stylesheet" href="../adlercode.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/favicons/apple-touch-icon.png" />
    <link rel="manifest" href="../site.webmanifest" />
  </head>
  <body>
    <header class="site-header" aria-label="Adlercode Navigation">
      <a class="brand" href="../index.html" aria-label="Adlercode Startseite">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Adlercode</span>
      </a>
      <nav class="site-nav" aria-label="Hauptnavigation"></nav>
    </header>

    <main class="library-page-shell messages-shell">
      <section class="library-page messages-page" aria-labelledby="messages-title" data-messages-page>
        <header class="library-page-header messages-header">
          <p class="eyebrow">Austausch</p>
          <h1 id="messages-title">Nachrichten</h1>
          <p>Direkte Unterhaltungen über Analysen, Filme, Charaktere und Muster.</p>
        </header>

        <div class="messages-layout">
          <aside class="messages-list-panel" aria-label="Unterhaltungen">
            <div class="messages-panel-head">
              <h2>Kontakte</h2>
              <p>Personen, mit denen bereits ein Austausch aus einer Analyse oder einem Inhalt entstanden ist.</p>
            </div>
            <div class="messages-list" data-chat-list></div>
          </aside>

          <section class="messages-thread-panel" aria-live="polite" data-chat-thread>
            <div class="messages-empty">
              <p>Wähle eine Unterhaltung aus.</p>
            </div>
          </section>
        </div>
      </section>
    </main>

    <footer class="site-footer" aria-label="Footer">
      <div class="footer-contact">
        <nav class="footer-links" aria-label="Footer Navigation">
          <a href="../datenschutz/">Datenschutz</a>
          <a href="../impressum/">Impressum</a>
          <a href="../kontakt.html">Kontakt</a>
        </nav>
        <a class="contact-link" href="mailto:info@adlercode.com">info@adlercode.com</a>
      </div>
    </footer>

    <script src="../adlercode-terms.js?v=terms"></script>
    <script src="../adlercode.js?v=main-structure"></script>
    <script src="./nachrichten.js?v=professional-chat"></script>
  </body>
</html>
