<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Musterbibliothek | Adlercode</title>
    <meta
      name="description"
      content="Adlercode Musterbibliothek: ein Explorer für Muster, Systeme, Programme und Begriffe."
    />
    <link rel="stylesheet" href="../adlercode.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/favicons/apple-touch-icon.png" />
    <link rel="manifest" href="../site.webmanifest" />
  </head>
  <body class="library-explorer-body">
    <header class="site-header" aria-label="Adlercode Navigation">
      <a class="brand" href="../index.html" aria-label="Adlercode Startseite">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Adlercode</span>
      </a>
      <nav class="site-nav" aria-label="Hauptnavigation">
      </nav>
    </header>

    <main id="top" class="library-explorer-shell">
      <section class="library-explorer" aria-label="Musterbibliothek Explorer">
        <div class="library-explorer-toolbar">
          <button
            class="library-menu-button"
            type="button"
            aria-label="Bibliotheksnavigation öffnen"
            aria-expanded="false"
            data-explorer-menu
          >
            <span></span>
            <span></span>
            <span></span>
          </button>

          <div class="library-explorer-search">
            <label for="pattern-library-search">Musterbibliothek</label>
            <input
              id="pattern-library-search"
              type="search"
              placeholder="Suche nach Mustern, Systemen oder Begriffen ..."
              autocomplete="off"
              data-pattern-search
            />
          </div>
        </div>

        <div class="library-explorer-layout">
          <aside class="library-explorer-sidebar" aria-label="Bibliotheksnavigation" data-explorer-sidebar>
            <div class="library-sidebar-head">
              <button class="library-sidebar-close" type="button" aria-label="Navigation schließen" data-explorer-close>Schließen</button>
            </div>
            <div class="library-search-results" data-search-results></div>
            <nav class="library-tree" aria-label="Kategorien und Unterkategorien" data-explorer-nav></nav>
          </aside>

          <section class="library-explorer-content" aria-live="polite" data-explorer-content>
            <div class="library-empty-state">
              <p class="eyebrow">Musterbibliothek</p>
              <h1>Musterbibliothek</h1>
              <p>Wähle links eine Kategorie oder nutze die Suche.</p>
            </div>
          </section>
        </div>
      </section>
    </main>

    <footer class="site-footer" aria-label="Footer">
      <div class="footer-contact">
        <nav class="footer-links" aria-label="Footer Navigation">
          <a href="../datenschutz/">Datenschutz</a>
          <a href="../impressum/">Impressum</a>
          <a href="../kontakt.html">Kontakt</a>
        </nav>
        <a class="contact-link" href="mailto:info@adlercode.com">info@adlercode.com</a>
      </div>
    </footer>

    <script src="../adlercode-terms.js?v=terms"></script>
    <script src="../adlercode.js?v=explorer"></script>
    <script src="../adlercode-bibliotheken.js?v=bibliotheken"></script>
  </body>
</html>
