<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meine Analysen | Adlercode</title>
    <meta name="description" content="Gespeicherte Film- und Charakteranalysen in Adlercode." />
    <link rel="stylesheet" href="../adlercode.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/favicons/apple-touch-icon.png" />
    <link rel="manifest" href="../site.webmanifest" />
  </head>
  <body>
    <header class="site-header" aria-label="Adlercode Navigation">
      <a class="brand" href="../index.html" aria-label="Adlercode Startseite">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Adlercode</span>
      </a>
      <nav class="site-nav" aria-label="Hauptnavigation"></nav>
    </header>

    <main class="library-page-shell analysis-library-shell">
      <section class="library-page analysis-library-page" aria-labelledby="analysis-library-title" data-analysis-library>
        <header class="library-page-header">
          <p class="eyebrow">Analysebibliothek</p>
          <h1 id="analysis-library-title">Meine Analysen</h1>
          <p>Gespeicherte Film- und Charakteranalysen an einem Ort.</p>
        </header>

        <nav class="analysis-library-tabs" aria-label="Analysebereiche">
          <button type="button" class="is-selected" data-analysis-tab="films">Filmanalysen</button>
          <button type="button" data-analysis-tab="characters">Charakteranalysen</button>
        </nav>

        <section class="analysis-library-content" aria-live="polite" data-analysis-content></section>
      </section>
    </main>

    <footer class="site-footer" aria-label="Footer">
      <div class="footer-contact">
        <nav class="footer-links" aria-label="Footer Navigation">
          <a href="../datenschutz/">Datenschutz</a>
          <a href="../impressum/">Impressum</a>
          <a href="../kontakt.html">Kontakt</a>
        </nav>
        <a class="contact-link" href="mailto:info@adlercode.com">info@adlercode.com</a>
      </div>
    </footer>

    <script src="../adlercode-terms.js?v=terms"></script>
    <script src="../adlercode.js?v=main-structure"></script>
    <script src="./meine-analysen.js?v=local-library"></script>
