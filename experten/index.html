<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Experten | Adlercode</title>
    <meta name="description" content="Adlercode Expertenbereich mit Profilen, Fachgebieten, Analysen, Büchern, Videos und Verifizierung." />
    <link rel="stylesheet" href="../adlercode.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/favicons/apple-touch-icon.png" />
    <link rel="manifest" href="../site.webmanifest" />
  </head>
  <body>
    <header class="site-header" aria-label="Adlercode Navigation">
      <a class="brand" href="../index.html" aria-label="Adlercode Startseite">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Adlercode</span>
      </a>
      <nav class="site-nav" aria-label="Hauptnavigation"></nav>
    </header>

    <main class="experts-shell">
      <section class="experts-page" aria-labelledby="experts-title" data-experts-page>
        <header class="experts-hero">
          <p class="eyebrow">Expertenbereich</p>
          <h1 id="experts-title">Adlercode Experten</h1>
          <p>Profile, Fachgebiete, Analysen und Ressourcen von Personen, die später mit Adlercode arbeiten und zur Community beitragen können.</p>
          <div class="experts-search" role="search">
            <input type="search" placeholder="Suche nach Experten, Fachgebieten oder Analysen ..." data-expert-search />
          </div>
        </header>

        <div class="experts-layout">
          <aside class="experts-sidebar" aria-label="Expertenliste">
            <div class="experts-filter-row" aria-label="Expertenfilter">
              <button type="button" class="is-selected" data-expert-filter="all">Alle</button>
              <button type="button" data-expert-filter="verified">Verifiziert</button>
              <button type="button" data-expert-filter="justice">Justice</button>
              <button type="button" data-expert-filter="mind">Mind</button>
            </div>
            <div class="experts-list" data-expert-list></div>
          </aside>

          <section class="expert-detail" aria-live="polite" data-expert-detail></section>
        </div>
      </section>
    </main>

    <footer class="site-footer" aria-label="Footer">
      <div class="footer-contact">
        <nav class="footer-links" aria-label="Footer Navigation">
          <a href="../datenschutz/">Datenschutz</a>
          <a href="../impressum/">Impressum</a>
          <a href="../kontakt.html">Kontakt</a>
        </nav>
        <a class="contact-link" href="mailto:info@adlercode.com">info@adlercode.com</a>
      </div>
    </footer>

    <script src="../adlercode-terms.js?v=terms"></script>
    <script src="../adlercode.js?v=experts"></script>
    <script src="./experten.js?v=demo-1"></script>
  </body>
</html>
