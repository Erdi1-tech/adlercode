<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Justice Community | Adlercode</title>
    <meta name="description" content="Demo-Community für Adlercode Justice mit Fällen, Kommentaren und Filtern." />
    <link rel="stylesheet" href="../../adlercode.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/favicons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../../assets/favicons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="../../assets/favicons/apple-touch-icon.png" />
    <link rel="manifest" href="../../site.webmanifest" />
  </head>
  <body>
    <header class="site-header" aria-label="Adlercode Navigation">
      <a class="brand" href="../../index.html" aria-label="Adlercode Startseite">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Adlercode</span>
      </a>
      <nav class="site-nav" aria-label="Hauptnavigation"></nav>
    </header>

    <main class="library-page-shell justice-module-shell">
      <section class="library-page justice-module-page" aria-labelledby="justice-community-title" data-justice-community>
        <header class="library-page-header justice-case-header">
          <p class="eyebrow">Adlercode Justice</p>
          <h1 id="justice-community-title">Justice Community</h1>
          <p>Demo-Übersicht für öffentliche Fälle, Diskussionen und Perspektiven.</p>
        </header>

        <div class="justice-community-tools">
          <input type="search" placeholder="Suche nach Fällen, Kategorien oder Kommentaren..." data-justice-community-search />
          <div class="analysis-library-tabs justice-community-tabs" aria-label="Justice Community Filter">
            <button type="button" class="is-selected" data-justice-community-tab="latest">Neueste Fälle</button>
            <button type="button" data-justice-community-tab="popular">Beliebteste Fälle</button>
            <button type="button" data-justice-community-tab="discussed">Meistdiskutierte Fälle</button>
            <button type="button" data-justice-community-tab="comments">Neueste Kommentare</button>
          </div>
        </div>

        <section class="justice-community-feed" aria-live="polite" data-justice-community-feed></section>
      </section>
    </main>

    <footer class="site-footer" aria-label="Footer">
      <div class="footer-contact">
        <nav class="footer-links" aria-label="Footer Navigation">
          <a href="../../datenschutz/">Datenschutz</a>
          <a href="../../impressum/">Impressum</a>
          <a href="../../kontakt.html">Kontakt</a>
        </nav>
        <a class="contact-link" href="mailto:info@adlercode.com">info@adlercode.com</a>
      </div>
    </footer>

    <script src="../../adlercode.js?v=justice-community"></script>
    <script src="./justice-community.js?v=demo-1"></script>
  </body>
</html>
