<!DOCTYPE html>
<html lang="de">
  <head>

  <body class="library-explorer-body">
    <header class="site-header" aria-label="Adlercode Navigation">
      <a class="brand" href="../../index.html" aria-label="Adlercode Startseite">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Adlercode</span>
      </a>
      <nav class="site-nav" aria-label="Hauptnavigation"></nav>
    </header>

    <main id="top" class="library-explorer-shell justice-library-explorer-shell">
      <section class="library-explorer justice-library-explorer is-nav-open" aria-label="Justice Bibliothek Explorer" data-justice-library>
        <div class="library-explorer-toolbar">
          <button class="library-menu-button" type="button" aria-label="Bibliotheksnavigation öffnen" aria-expanded="true" data-justice-library-menu>
            <span></span>
            <span></span>
            <span></span>

          <div class="library-explorer-search">
            <label for="justice-library-search">Justice Bibliothek</label>

        <div class="library-explorer-layout">
          <aside class="library-explorer-sidebar" aria-label="Justice Navigation" data-justice-library-sidebar>
            <div class="library-sidebar-head">
              <button class="library-sidebar-close" type="button" aria-label="Navigation schließen" data-justice-library-close>Schließen</button>
            </div>
            <nav class="library-tree" aria-label="Justice Kategorien" data-justice-library-nav></nav>
          </aside>

          <section class="library-explorer-content" aria-live="polite" data-justice-library-content></section>

    </main>

    <footer class="site-footer" aria-label="Footer">
      <div class="footer-contact">
        <nav class="footer-links" aria-label="Footer Navigation">
