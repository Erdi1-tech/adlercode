<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eigenen Fall analysieren | Adlercode Justice</title>
    <meta name="description" content="Demo-Oberfläche für eine eigene Adlercode-Justice-Fallanalyse." />
    <link rel="stylesheet" href="../../adlercode.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/favicons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../../assets/favicons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="../../assets/favicons/apple-touch-icon.png" />
    <link rel="manifest" href="../../site.webmanifest" />
  </head>
  <body>
    <header class="site-header" aria-label="Adlercode Navigation">
      <a class="brand" href="../../index.html" aria-label="Adlercode Startseite">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Adlercode</span>
      </a>
      <nav class="site-nav" aria-label="Hauptnavigation"></nav>
    </header>

    <main class="library-page-shell justice-module-shell">
      <section class="library-page justice-module-page" aria-labelledby="own-case-title">
        <header class="library-page-header justice-case-header">
          <p class="eyebrow">Adlercode Justice</p>
          <h1 id="own-case-title">Eigenen Fall analysieren</h1>
          <p>Eine hochwertige Demo-Oberfläche für anonyme Fallanalyse nach dem Adlercode-Framework.</p>
        </header>

        <form class="justice-form" data-justice-own-case>
          <section class="justice-form-card">
            <h2>Grunddaten</h2>
            <div class="justice-form-grid">
              <label>
                <span>Titel</span>
                <input type="text" value="Konflikt im Projektteam" />
              </label>
              <label>
                <span>Kategorie</span>
                <select>
                  <option>Arbeit</option>
                  <option>Familie</option>
                  <option>Nachbarschaft</option>
                  <option>Konflikt</option>
                  <option>Mediation</option>
                </select>
              </label>
            </div>
          </section>

          <section class="justice-form-card">
            <h2>Analyse</h2>
            <label>
              <span>Situation</span>
              <textarea>Ein Teammitglied übernimmt Entscheidungen ohne Abstimmung. Andere fühlen sich übergangen, während die Führung die Situation lange nicht klärt.</textarea>
            </label>
            <label>
              <span>Beteiligte</span>
              <textarea>Projektleitung, Teammitglied, betroffene Kollegen, Führungskraft</textarea>
            </label>
            <label>
              <span>Narrativanalyse</span>
              <textarea>Eine Seite beschreibt Verantwortung und Tempo, die andere Seite erlebt Kontrolle und fehlende Anerkennung.</textarea>
            </label>
            <label>
              <span>Systemanalyse</span>
              <textarea>Unklare Entscheidungsregeln, informelle Macht und fehlende Konfliktmoderation prägen das System.</textarea>
            </label>
            <label>
              <span>Moralanalyse</span>
              <textarea>Verantwortung liegt in Transparenz, Rollenklärung und fairer Beteiligung der Betroffenen.</textarea>
            </label>
            <label>
              <span>Kommentar</span>
              <textarea>Demo: Diese Eingaben werden noch nicht gespeichert, zeigen aber den späteren Ablauf.</textarea>
            </label>
          </section>

          <section class="justice-form-card justice-form-actions">
            <h2>Sichtbarkeit</h2>
            <div class="justice-visibility-options">
              <label>
                <input type="radio" name="visibility" checked />
                <span>
                  <strong>Privat speichern</strong>
                  <small>Nur für dich sichtbar.</small>
                </span>
              </label>
              <label>
                <input type="radio" name="visibility" />
                <span>
                  <strong>Für Community veröffentlichen</strong>
                  <small>Öffentlich sichtbar und diskutierbar.</small>
                </span>
              </label>
            </div>
            <button type="button" data-justice-demo-save>Demo-Analyse vormerken</button>
            <p data-justice-demo-feedback aria-live="polite"></p>
          </section>
        </form>
      </section>
    </main>

    <footer class="site-footer" aria-label="Footer">
      <div class="footer-contact">
        <nav class="footer-links" aria-label="Footer Navigation">
          <a href="../../datenschutz/">Datenschutz</a>
          <a href="../../impressum/">Impressum</a>
          <a href="../../kontakt.html">Kontakt</a>
        </nav>
        <a class="contact-link" href="mailto:info@adlercode.com">info@adlercode.com</a>
      </div>
    </footer>

    <script src="../../adlercode.js?v=justice-own-case"></script>
    <script src="./justice-eigener-fall.js?v=demo-1"></script>
  </body>
</html>
